name: studio-stack

networks:
  proxy:
    driver: bridge
  internal:
    driver: bridge

services:
  # Reverse proxy eliminitating the need for ip + port usage
  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    container_name: nginx-proxy-manager
    restart: unless-stopped
    ports:
      - "80:80"
      - "81:81"   # NPM admin UI
    environment:
      - TZ=America/New_York
    volumes:
      - /volume1/docker/nginx-proxy-manager/data:/data
      - /volume1/docker/nginx-proxy-manager/letsencrypt:/etc/letsencrypt
    networks:
      - proxy

  # Container management UI for Docker administration
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /volume1/docker/portainer:/data
    networks:
      - internal
      - proxy

  # MQTT broker for studio device messaging and bussing automations
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - /volume1/docker/mosquitto/config:/mosquitto/config
      - /volume1/docker/mosquitto/data:/mosquitto/data
      - /volume1/docker/mosquitto/log:/mosquitto/log
    networks:
      - internal
      - proxy

  # Automation engine 
  node-red:
    image: nodered/node-red:latest
    container_name: node-red
    restart: unless-stopped
    ports:
      - "1880:1880"
    environment:
      - TZ=America/New_York
    volumes:
      - /volume1/docker/node-red/data:/data
    depends_on:
      - mosquitto
    networks:
      - internal
      - proxy

  # Metrics collection system 
  prometheus:
    image: prom/prometheus:latest
    container_name: prom
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - /volume1/docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - /volume1/docker/prometheus/data:/prometheus
    networks:
      - internal
      - proxy

  # Visualization dashboard
   grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - TZ=America/New_York
    volumes:
      - /volume1/docker/grafana:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - internal
      - proxy

  # Time-series database for sensor data
  influxdb:
    image: influxdb:2.7
    container_name: influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      - TZ=America/New_York
    volumes:
      - /volume1/docker/influxdb2/data:/var/lib/influxdb2
      - /volume1/docker/influxdb2/config:/etc/influxdb2
    networks:
      - internal
      - proxy

  # Container resource metrics exporter (CPU, memory, network per container)
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - internal
      - proxy

  # Service uptime and availability monitoring with notifications
  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: uptime-kuma
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - /volume1/docker/uptime-kuma:/app/data
    networks:
      - internal
      - proxy

  # Endpoint probing exporter for Prometheus (HTTP, TCP, ICMP checks)
  blackbox-exporter:
    image: prom/blackbox-exporter:latest
    container_name: blackbox-exporter
    restart: unless-stopped
    ports:
      - "9115:9115"
    networks:
      - internal
      - proxy