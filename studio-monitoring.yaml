services:

  # Metrics collection system
  prometheus:
    image: prom/prometheus:latest
    container_name: prom
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - /volume1/docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - /volume1/docker/prometheus/data:/prometheus
    networks:
      - internal
      - proxy

  # Host-level metrics exporter for Prometheus
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - internal

  # Dashboards and visualization
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - TZ=America/New_York
    volumes:
      - /volume1/docker/grafana/data:/var/lib/grafana
    networks:
      - internal
      - proxy

  #network latency monitoring
  smokeping:
    image: linuxserver/smokeping:latest
    container_name: smokeping
    restart: unless-stopped
    ports:
      - "8082:80"
    environment:
      - TZ=America/New_York
    volumes:
      - /volume1/docker/smokeping/config:/config
    networks:
      - internal
      - proxy
